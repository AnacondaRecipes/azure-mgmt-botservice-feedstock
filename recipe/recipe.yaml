{% set name = "azure-mgmt-botservice" %}
{% set version = "2.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.zip
  sha256: 86c04d27c527c19d9600a88215fae2ba524dc674455387b0d0e51722b5a6d6ba

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - setuptools
    - wheel
    - python
    - pip
  run:
    - python
    - msrest >=0.7.1
    - azure-common >=1.1,<2
    - azure-mgmt-core >=1.3.2,<2.0.0
    - typing_extensions >=4.3.0  # [py<38]

test: 
  imports:
    - azure.mgmt.botservice
    - azure.mgmt.botservice.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure Bot Service Client Library for Python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: Microsoft Azure Bot Service Client Library for Python
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
